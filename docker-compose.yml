version: '3.8'

services:
  invoice-ocr-api:
    build: .
    ports:
      - "30004:30004"
    environment:
      - PORT=30004
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - INVOICE_OCR_API_KEY=${INVOICE_OCR_API_KEY:-dev-invoice-ocr-key}
      - RAPIDAPI_PROXY_SECRET=${RAPIDAPI_PROXY_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:30004/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - api-network

networks:
  api-network:
    driver: bridge
